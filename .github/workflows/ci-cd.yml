name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '9.0.x'
  NODE_VERSION: '22.x'

jobs:
  build-and-test-api:
    name: Build & Test API
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: 'Y'
          MSSQL_SA_PASSWORD: ${{ secrets.SQL_SA_PASSWORD }}
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $MSSQL_SA_PASSWORD -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ExpenseApprovalApi/ExpenseApproval.sln

      - name: Build solution
        run: dotnet build ExpenseApprovalApi/ExpenseApproval.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test ExpenseApprovalApi/ExpenseApproval.sln --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx" --results-directory ./test-results
        env:
          CONNECTION_STRING: "Server=localhost,1433;Database=ExpenseApprovalDb;User Id=sa;Password=${{ secrets.SQL_SA_PASSWORD }};TrustServerCertificate=True;"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: API Unit Tests
          path: './test-results/**/*.trx'
          reporter: dotnet-trx
          fail-on-error: true

  build-and-test-ui:
    name: Build & Test UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ExpenseApprovalUI/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ExpenseApprovalUI

      - name: Run tests
        run: npx jest --ci --coverage --reporters=default --reporters=jest-junit
        working-directory: ExpenseApprovalUI
        env:
          JEST_JUNIT_OUTPUT_DIR: ../test-results
          JEST_JUNIT_OUTPUT_NAME: ui-test-results.xml

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: UI Unit Tests
          path: './test-results/ui-test-results.xml'
          reporter: jest-junit
          fail-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-coverage-report
          path: ExpenseApprovalUI/coverage/

      - name: Build for production
        run: npm run build -- --configuration production
        working-directory: ExpenseApprovalUI

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ExpenseApprovalUI/dist/

  docker-build-backend:
    name: Docker Build - BackEnd
    runs-on: ubuntu-latest
    needs: build-and-test-api

    strategy:
      matrix:
        include:
          - service: expense-api
            dockerfile: ExpenseApprovalApi/src/Presentation/ExpenseApproval.Api/Dockerfile
          - service: expense-user
            dockerfile: ExpenseApprovalApi/src/Presentation/ExpenseApproval.User/Dockerfile
          - service: expense-gateway
            dockerfile: ExpenseApprovalApi/src/Presentation/ExpenseApproval.Gateway/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image (${{ matrix.service }})
        run: |
          docker build \
            -f ${{ matrix.dockerfile }} \
            -t ${{ matrix.service }}:${{ github.sha }} \
            -t ${{ matrix.service }}:latest \
            ./ExpenseApprovalApi

  docker-build-frontend:
    name: Docker Build - FrontEnd
    runs-on: ubuntu-latest
    needs: build-and-test-ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image (expense-ui)
        run: |
          docker build \
            -f ExpenseApprovalUI/Dockerfile \
            -t expense-ui:${{ github.sha }} \
            -t expense-ui:latest \
            ./ExpenseApprovalUI

  docker-compose-validation:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    needs: [build-and-test-api, build-and-test-ui]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet
        env:
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
          AUTH0_CLIENT_ID: placeholder
          AUTH0_CLIENT_SECRET: placeholder
